// /etc/named.conf

options {
# listen-on port 53 { 127.0.0.1; };
 directory "/var/named";
 allow-query { localhost; 192.168.0.0/16; };
 allow-transfer { 192.168.234.95;};
};

logging {
  channel single_log {
     file "/var/log/named/named.log" version3 ;
     severity info;
     print-time yes;
     print-severity yes;
     print-category yes;
  };
  category default {
    single_log;
  };
};


zone "." IN {
  type hint;
  file "named.ca";
};



include "/etc/named.rfc1912.zones";

// forwrard zone
zone "stage.local" IN {
  type master;
  file  "zone.stage.com";
};

zone "168.192.in-addr.arpa" IN {
  type master;
  file  "reversezone.stage.com";
};





